<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Скачать приложение</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: #ffffff;
            border-radius: 24px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.10);
            text-align: center;
        }
        h1 {
            font-size: 32px;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 18px;
            color: #4a5568;
            margin-bottom: 40px;
        }
        .section {
            margin-bottom: 48px;
        }
        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 16px;
        }
        .section-desc {
            font-size: 15px;
            color: #718096;
            margin-bottom: 20px;
        }
        .download-btn {
            display: inline-block;
            padding: 16px 48px;
            background: #2b6cb0;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 40px;
            transition: background 0.2s ease;
            box-shadow: 0 4px 14px rgba(43, 108, 176, 0.35);
        }
        .download-btn:hover {
            background: #1a4f8b;
        }
        .qr-image {
            width: 200px;
            height: 200px;
            background: #ffffff;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 14px;
            border: 2px solid #e2e8f0;
            overflow: hidden;
        }
        .qr-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .qr-label a {
            color: #2b6cb0;
            text-decoration: none;
        }
        .qr-label a:hover {
            text-decoration: underline;
        }
        @media (max-width: 480px) {
            .container { padding: 30px 20px; }
            h1 { font-size: 26px; }
            .download-btn { padding: 14px 32px; font-size: 16px; width: 100%; }
            .qr-image { width: 160px; height: 160px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📲 Скачайте наше приложение</h1>
        <p class="subtitle">Выберите удобный способ установки</p>

        <div class="section">
            <div class="section-title">💻 Для компьютера</div>
            <p class="section-desc">Скачайте установочный файл для Windows</p>
            <a href="#" class="download-btn">⬇ Скачать для Windows</a>
        </div>

        <div class="section">
            <div class="section-title">📱 Для телефона</div>
            <p class="section-desc">Наведите камеру телефона на QR-код</p>
            <div class="qr-image">
                <img src="qr-code.png" alt="QR-код для скачивания приложения" />
            </div>
            <div class="qr-label">
                <a href="#">Google Play</a> · <a href="#">App Store</a>
            </div>
        </div>
    </div>
</body>
</html>
